function safeKey(nome){
  return nome.replace(/\.|\/|#|\$|\[|\]/g, '_');
}

function safeObj(obj){
  if(typeof obj !== 'object' || obj === null || Array.isArray(obj)) return obj;
  const out = {};
  for(const [k,v] of Object.entries(obj)){
    out[safeKey(k)] = safeObj(v);
  }
  return out;
}

function log(msg, tipo='info'){
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${tipo}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function migrar(){
  const btn = document.getElementById('btn');
  const bar = document.getElementById('bar');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'A migrar...';
  status.style.display = 'none';
  document.getElementById('log').innerHTML = '';

  let erros = 0;
  for(let i = 0; i < PARTES.length; i++){
    const parte = PARTES[i];
    const pct = Math.round(((i+1) / PARTES.length) * 100);
    bar.style.width = pct + '%';
    log(`⏳ ${parte.label}...`);
    try{
      const dadosSafe = safeObj(parte.data);
      const r = await fetch(FIREBASE_URL + FB + parte.path + '.json', {
        method: 'PUT',
        body: JSON.stringify(dadosSafe),
        headers: {'Content-Type': 'application/json'}
      });
      if(!r.ok){
        const txt = await r.text();
        throw new Error(`HTTP ${r.status}: ${txt.substring(0,80)}`);
      }
      log(`✅ ${parte.label}`, 'ok');
    } catch(e){
      log(`❌ ${parte.label} — ${e.message}`, 'err');
      erros++;
    }
    await new Promise(res => setTimeout(res, 400));
  }

  status.style.display = 'block';
  if(erros === 0){
    status.className = 'status ok';
    status.textContent = '✅ Migração concluída com sucesso! Podes fechar esta janela.';
    btn.textContent = '✅ Concluído';
  } else {
    status.className = 'status err';
    status.textContent = `⚠️ ${erros} erro(s). Clica novamente para tentar.`;
    btn.disabled = false;
    btn.textContent = '🔄 Tentar novamente';
  }
}
