<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dafilgest — Plataforma Interna</title>
<style>
:root{
  --navy:#060d18;--navy2:#0d1f35;--navy3:#132843;--navy4:#0a1929;
  --gold:#c9a84c;--gold2:#e8c97a;
  --white:#f0f4f8;--gray:#8a9bb0;--gray2:#4a6080;
  --green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--blue:#3498db;--purple:#9b59b6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);border-radius:14px;padding:48px 40px;width:380px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.login-logo{font-size:30px;font-weight:800;color:var(--gold);letter-spacing:3px;margin-bottom:4px;}
.login-sub{color:var(--gray);font-size:12px;margin-bottom:32px;}
.login-box input{width:100%;padding:12px 16px;background:var(--navy3);border:1px solid #2a3f5a;border-radius:8px;color:var(--white);font-size:15px;margin-bottom:10px;outline:none;}
.login-box input:focus{border-color:var(--gold);}
.login-box button{width:100%;padding:13px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:1px;}
.login-box button:hover{background:var(--gold2);}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;}
header{background:var(--navy2);border-bottom:2px solid var(--gold);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200;}
.h-logo{font-size:17px;font-weight:800;color:var(--gold);letter-spacing:2px;}
.h-logo span{color:var(--gray);font-weight:400;font-size:12px;letter-spacing:0;margin-left:10px;}
.h-right{display:flex;align-items:center;gap:10px;}
.badge-admin{background:var(--gold);color:var(--navy);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.badge-equipa{background:var(--blue);color:#fff;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.btn-sm{background:none;border:1px solid #2a3f5a;color:var(--gray);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}
.fb-status{font-size:11px;display:flex;align-items:center;gap:5px;}
.fb-dot{width:7px;height:7px;border-radius:50%;background:#555;}
.fb-dot.ok{background:var(--green);}
.fb-dot.err{background:var(--red);}

nav{background:var(--navy2);border-bottom:1px solid #1a2f4a;padding:0 28px;display:flex;gap:2px;}
.nav-tab{padding:12px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray);border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;}
.nav-tab:hover{color:var(--white);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

main{flex:1;padding:24px 28px;}
.section{display:none;}
.section.active{display:block;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--navy2);border:1px solid var(--gold);border-radius:14px;padding:32px;width:540px;max-width:95vw;max-height:85vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:20px;}
.modal-close{float:right;background:none;border:none;color:var(--gray);font-size:20px;cursor:pointer;margin-top:-4px;}
.modal-close:hover{color:var(--red);}
.form-row{display:flex;gap:10px;margin-bottom:12px;align-items:flex-end;}
.form-group{flex:1;}
.form-group label{display:block;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.form-group input,.form-group select{width:100%;padding:9px 12px;background:var(--navy3);border:1px solid #2a3f5a;border-radius:7px;color:var(--white);font-size:13px;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--gold);}
.btn-primary{padding:9px 20px;background:var(--gold);color:var(--navy);border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:13px;}
.btn-primary:hover{background:var(--gold2);}
.btn-danger{padding:9px 16px;background:rgba(231,76,60,.15);color:var(--red);border:1px solid var(--red);border-radius:7px;cursor:pointer;font-size:12px;}
.btn-danger:hover{background:rgba(231,76,60,.3);}
.btn-ghost{padding:7px 14px;background:none;color:var(--gray);border:1px solid #2a3f5a;border-radius:7px;cursor:pointer;font-size:12px;}
.btn-ghost:hover{border-color:var(--gray2);color:var(--white);}

/* gestão lista no modal */
.mgmt-list{max-height:340px;overflow-y:auto;margin-top:16px;}
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #1a2f4a;font-size:12px;}
.mgmt-item:hover{background:rgba(255,255,255,.03);}
.mgmt-item .nome{flex:1;color:var(--white);}
.mgmt-item .meta{color:var(--gray);font-size:11px;margin:0 12px;}
.mgmt-search{width:100%;padding:9px 12px;background:var(--navy3);border:1px solid #2a3f5a;border-radius:7px;color:var(--white);font-size:13px;outline:none;margin-bottom:10px;}
.mgmt-search:focus{border-color:var(--gold);}

/* ── CARDS ── */
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px;}
.card{background:var(--navy2);border:1px solid #1a2f4a;border-radius:10px;padding:18px 20px;}
.card-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.card-value{font-size:26px;font-weight:800;color:var(--gold);}
.card-sub{font-size:11px;color:var(--gray);margin-top:3px;}

/* ── TOOLBAR ── */
.table-wrap{background:var(--navy2);border:1px solid #1a2f4a;border-radius:10px;overflow:hidden;}
.tbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2f4a;flex-wrap:wrap;gap:10px;}
.tbar-title{font-size:14px;font-weight:700;color:var(--white);}
.tbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ctrl-sel,.ctrl-inp{background:var(--navy3);border:1px solid #2a3f5a;color:var(--white);padding:7px 11px;border-radius:7px;font-size:12px;outline:none;}
.ctrl-sel:focus,.ctrl-inp:focus{border-color:var(--gold);}
.ctrl-inp{min-width:190px;}
.btn-gestao{padding:7px 14px;background:rgba(201,168,76,.12);color:var(--gold);border:1px solid var(--gold);border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;}
.btn-gestao:hover{background:rgba(201,168,76,.25);}

/* ── TABLE ── */
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--navy4);color:var(--gold);font-weight:700;padding:9px 11px;text-align:left;white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
tbody tr{border-bottom:1px solid #0f1f33;}
tbody tr:hover{background:rgba(201,168,76,.03);}
tbody td{padding:8px 11px;vertical-align:middle;}
.td-nome{max-width:240px;font-size:12px;}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.badge:hover{opacity:.75;}
.b-sim{background:rgba(46,204,113,.15);color:var(--green);border:1px solid var(--green);}
.b-nao{background:rgba(231,76,60,.15);color:var(--red);border:1px solid var(--red);}
.b-na{background:rgba(138,155,176,.15);color:var(--gray);border:1px solid var(--gray);}
.b-empty{background:rgba(52,152,219,.07);color:#5a7a9a;border:1px dashed #2a4a6a;}

/* ── SAFT ── */
.b-s{background:rgba(46,204,113,.15);color:var(--green);border:1px solid var(--green);}
.b-n{background:rgba(231,76,60,.15);color:var(--red);border:1px solid var(--red);}
.b-nav{background:rgba(138,155,176,.15);color:var(--gray);border:1px solid var(--gray);}
.b-v{background:rgba(52,152,219,.15);color:var(--blue);border:1px solid var(--blue);}
.b-c{background:rgba(243,156,18,.15);color:var(--orange);border:1px solid var(--orange);}

/* ── INLINE SELECT PAGAMENTOS ── */
.inline-sel{background:var(--navy4);border:1px solid #2a3f5a;color:var(--white);padding:3px 6px;border-radius:5px;font-size:11px;cursor:pointer;max-width:110px;}

/* ── OBS ── */
.obs-inp{background:transparent;border:none;color:var(--gray);font-size:11px;width:100%;min-width:70px;outline:none;font-family:inherit;}
.obs-inp:focus{background:var(--navy3);padding:2px 6px;border-radius:4px;}

/* ── PAGINATION ── */
.pagination{display:flex;gap:5px;align-items:center;padding:10px 14px;justify-content:flex-end;border-top:1px solid #1a2f4a;}
.pg-btn{padding:4px 9px;background:var(--navy3);border:1px solid #2a3f5a;color:var(--gray);border-radius:5px;cursor:pointer;font-size:11px;}
.pg-btn.active,.pg-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700;}
.pg-info{font-size:11px;color:var(--gray);margin-right:8px;}

/* ── TOTAIS BAR ── */
.totais-bar{background:var(--navy4);border-top:2px solid var(--gold);padding:9px 14px;display:flex;gap:20px;font-size:12px;flex-wrap:wrap;}
.total-item{color:var(--gray);}
.total-item strong{color:var(--gold);margin-left:4px;}

/* ── LOCKED ── */
.locked-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:14px;}
.locked-box .lock-icon{font-size:50px;}
.locked-box p{color:var(--gray);font-size:13px;}
.locked-box input{padding:10px 16px;background:var(--navy3);border:1px solid #2a3f5a;color:var(--white);border-radius:8px;font-size:14px;outline:none;text-align:center;width:260px;}
.locked-box input:focus{border-color:var(--gold);}

/* ── ALERT ── */
.alert-bar{background:rgba(243,156,18,.1);border:1px solid var(--orange);border-radius:8px;padding:12px 16px;margin-bottom:18px;display:flex;gap:10px;}
.alert-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:3px;}
.alert-items{font-size:11px;color:var(--gray);line-height:1.9;}

/* ── DASHBOARD PRAZOS ── */
.prazos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;}
.prazo-card{background:var(--navy3);border-radius:8px;padding:14px;}
.prazo-card .pt{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
.prazo-card .pd{font-size:14px;font-weight:700;color:var(--gold);margin:4px 0;}
.prazo-card .ps{font-size:11px;color:var(--gray);}

/* ── SECTION TITLE ── */
.sec-title{font-size:19px;font-weight:800;color:var(--gold);margin-bottom:18px;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;}
</style>
</head>
<body>

<!-- ═══════════════════════════ LOGIN ═══════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">DAFILGEST</div>
    <div class="login-sub">Gabinete de Contabilidade · Plataforma Interna</div>
    <input type="password" id="loginPass" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ENTRAR</button>
    <div class="login-err" id="loginErr"></div>
  </div>
  <div style="color:#1a2f4a;font-size:11px">© 2026 Dafilgest, Lda. · Uso interno exclusivo</div>
</div>

<!-- ═══════════════════════════ APP ═══════════════════════════ -->
<div id="app">
  <header>
    <div class="h-logo">DAFILGEST <span>Plataforma Interna</span></div>
    <div class="h-right">
      <div class="fb-status"><div class="fb-dot" id="fbDot"></div><span id="fbLabel" style="color:var(--gray);font-size:11px">Firebase…</span></div>
      <span id="userBadge"></span>
      <button class="btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </header>
  <nav>
    <div class="nav-tab active" id="tab-dash" onclick="showTab('dash')">📊 Dashboard</div>
    <div class="nav-tab" id="tab-iva" onclick="showTab('iva')">🟡 Mapa IVA</div>
    <div class="nav-tab" id="tab-saft" onclick="showTab('saft')">📁 SAFT</div>
    <div class="nav-tab" id="tab-rec" onclick="showTab('rec')">💶 Recebimentos</div>
  </nav>
  <main>
    <div class="section active" id="sec-dash"></div>
    <div class="section" id="sec-iva"></div>
    <div class="section" id="sec-saft"></div>
    <div class="section" id="sec-rec"></div>
  </main>
</div>

<!-- ═══════════════════════════ MODAIS GESTÃO ═══════════════════════════ -->

<!-- MODAL IVA -->
<div class="modal-overlay" id="modalIVA">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalIVA')">✕</button>
    <h3>⚙️ Gerir Empresas — Mapa IVA</h3>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Nome da Empresa</label>
        <input type="text" id="ivaNewNome" placeholder="Nome completo...">
      </div>
      <div class="form-group">
        <label>Período IVA</label>
        <select id="ivaNewPer">
          <option value="Trimestral">Trimestral</option>
          <option value="Mensal">Mensal</option>
        </select>
      </div>
      <div><button class="btn-primary" onclick="addEmpresaIVA()" style="margin-top:18px">+ Adicionar</button></div>
    </div>
    <div id="ivaAddErr" style="color:var(--red);font-size:12px;margin-bottom:8px;"></div>
    <input class="mgmt-search" id="ivaMgmtSearch" placeholder="🔍 Filtrar lista..." oninput="renderIVAMgmt()">
    <div class="mgmt-list" id="ivaMgmtList"></div>
  </div>
</div>

<!-- MODAL SAFT -->
<div class="modal-overlay" id="modalSAFT">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalSAFT')">✕</button>
    <h3>⚙️ Gerir Empresas — SAFT</h3>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Nome da Empresa</label>
        <input type="text" id="saftNewNome" placeholder="Nome completo...">
      </div>
      <div><button class="btn-primary" onclick="addEmpresaSAFT()" style="margin-top:18px">+ Adicionar</button></div>
    </div>
    <div id="saftAddErr" style="color:var(--red);font-size:12px;margin-bottom:8px;"></div>
    <input class="mgmt-search" id="saftMgmtSearch" placeholder="🔍 Filtrar lista..." oninput="renderSAFTMgmt()">
    <div class="mgmt-list" id="saftMgmtList"></div>
  </div>
</div>

<!-- MODAL RECEBIMENTOS -->
<div class="modal-overlay" id="modalREC">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalREC')">✕</button>
    <h3>⚙️ Gerir Clientes — Recebimentos</h3>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Nome do Cliente</label>
        <input type="text" id="recNewNome" placeholder="Nome completo...">
      </div>
      <div class="form-group">
        <label>Avença/mês (€)</label>
        <input type="number" id="recNewAvenca" placeholder="0" min="0">
      </div>
      <div><button class="btn-primary" onclick="addClienteREC()" style="margin-top:18px">+ Adicionar</button></div>
    </div>
    <div id="recAddErr" style="color:var(--red);font-size:12px;margin-bottom:8px;"></div>
    <input class="mgmt-search" id="recMgmtSearch" placeholder="🔍 Filtrar lista..." oninput="renderRECMgmt()">
    <div class="mgmt-list" id="recMgmtList"></div>
  </div>
</div>

<!-- MODAL CONFIRMAR REMOÇÃO -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal" style="width:400px;text-align:center;">
    <h3 id="confirmTitle">Confirmar remoção</h3>
    <p id="confirmMsg" style="color:var(--gray);font-size:13px;margin:16px 0 24px;line-height:1.6;"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn-ghost" onclick="closeModal('modalConfirm')">Cancelar</button>
      <button class="btn-danger" id="confirmBtn">Remover</button>
    </div>
  </div>
</div>

async function fbGet(path){
  try{
    const r = await fetch(FIREBASE_URL+FB+path+'.json',{cache:'no-store'});
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){ return null; }
}
async function fbSet(path,data){
  try{
    const r = await fetch(FIREBASE_URL+FB+path+'.json',{
      method:'PUT', body:JSON.stringify(data),
      headers:{'Content-Type':'application/json'}
    });
    if(!r.ok) throw new Error(r.status);
    setFBStatus(true);
  }catch(e){
    setFBStatus(false);
    console.warn('Firebase write error',e);
  }
}
async function fbDelete(path){
  try{
    await fetch(FIREBASE_URL+FB+path+'.json',{method:'DELETE'});
  }catch(e){}
}
function setFBStatus(ok){
  document.getElementById('fbDot').className='fb-dot '+(ok?'ok':'err');
  document.getElementById('fbLabel').textContent=ok?'Firebase ✓':'Firebase — sem ligação';
}

function loadFirebase(cb){
  Promise.all([
    fbGet('/meta'),
    fbGet('/iva'),
    fbGet('/saft'),
    fbGet('/rec'),
  ]).then(([meta,iva,saft,rec])=>{
    setFBStatus(meta!==null || iva!==null || saft!==null || rec!==null);
    if(meta){
      if(meta.clientes) state.clientes = meta.clientes;
      if(meta.empresasIVA) state.empresasIVA = meta.empresasIVA;
      if(meta.nomesSAFT) state.nomesSAFT = meta.nomesSAFT;
    }
    if(iva) state.iva = iva;
    if(saft) state.saft = saft;
    if(rec) state.rec = rec;
    cb();
  }).catch(()=>{ setFBStatus(false); cb(); });
}

function saveMeta(){

    empresasIVA: state.empresasIVA,
    nomesSAFT: state.nomesSAFT,

  document.getElementById('ivaAddErr').textContent='';

function renderIVAMgmt(){
  const q=(document.getElementById('ivaMgmtSearch').value||'').toLowerCase();
  const lista=state.empresasIVA.filter(e=>!q||e.nome.toLowerCase().includes(q));
  const el=document.getElementById('ivaMgmtList');
  el.innerHTML=lista.length===0?'<div style="color:var(--gray);font-size:12px;padding:12px">Sem resultados.</div>':
    lista.map((e,i)=>`
      <div class="mgmt-item">
        <span class="nome">${e.nome}</span>
        <span class="meta">${e.periodo}</span>
        <span class="meta" style="color:${e.ativa==='Sim'?'var(--green)':'var(--red)'}">${e.ativa==='Sim'?'Ativa':'Inativa'}</span>
        <button class="btn-ghost" onclick="toggleIVAAtiva('${e.nome.replace(/'/g,"\\'")}',${i})" style="font-size:11px;padding:3px 9px;margin-right:6px">${e.ativa==='Sim'?'Desativar':'Ativar'}</button>
        <button class="btn-danger" onclick="removeEmpresaIVA('${e.nome.replace(/'/g,"\\'")}',${i})" style="font-size:11px;padding:3px 9px">✕</button>
      </div>`).join('');
}
function addEmpresaIVA(){
  const nome=document.getElementById('ivaNewNome').value.trim();
  const per=document.getElementById('ivaNewPer').value;
  const err=document.getElementById('ivaAddErr');
  if(!nome){ err.textContent='Introduza o nome da empresa.'; return; }
  if(state.empresasIVA.find(e=>e.nome.toLowerCase()===nome.toLowerCase())){ err.textContent='Empresa já existe.'; return; }
  const num=Math.max(0,...state.empresasIVA.map(e=>e.num||0))+1;
  state.empresasIVA.push({num,nome,periodo:per,ativa:'Sim'});
  err.textContent=''; document.getElementById('ivaNewNome').value='';
  saveMeta(); renderIVAMgmt(); renderIVA();
}
function toggleIVAAtiva(nome){
  const e=state.empresasIVA.find(x=>x.nome===nome);
  if(!e) return;
  e.ativa=e.ativa==='Sim'?'Não':'Sim';
  saveMeta(); renderIVAMgmt(); renderIVA();
}
function removeEmpresaIVA(nome){

    state.empresasIVA=state.empresasIVA.filter(e=>e.nome!==nome);
    saveMeta(); renderIVAMgmt(); renderIVA();
  });
}

function openGestaoREC(){
  document.getElementById('recNewNome').value='';
  document.getElementById('recNewAvenca').value='';
  document.getElementById('recAddErr').textContent='';
  openModal('modalREC');
  renderRECMgmt();
}
function renderRECMgmt(){
  const q=(document.getElementById('recMgmtSearch').value||'').toLowerCase();
  const lista=state.clientes.filter(c=>!q||c.nome.toLowerCase().includes(q));
  const el=document.getElementById('recMgmtList');
  el.innerHTML=lista.length===0?'<div style="color:var(--gray);font-size:12px;padding:12px">Sem resultados.</div>':
    lista.map((c,i)=>`
      <div class="mgmt-item">
        <span class="nome">${c.nome}</span>
        <span class="meta">€${(c.avenca||0).toLocaleString('pt-PT')}/mês</span>
        <button class="btn-danger" onclick="removeClienteREC('${c.nome.replace(/'/g,"\\'")}',${i})" style="font-size:11px;padding:3px 9px">✕</button>
      </div>`).join('');
}
function addClienteREC(){
  const nome=document.getElementById('recNewNome').value.trim();
  const avenca=parseFloat(document.getElementById('recNewAvenca').value)||0;
  const err=document.getElementById('recAddErr');
  if(!nome){ err.textContent='Introduza o nome do cliente.'; return; }
  if(state.clientes.find(c=>c.nome.toLowerCase()===nome.toLowerCase())){ err.textContent='Cliente já existe.'; return; }
  if(avenca<=0){ err.textContent='Introduza um valor de avença válido.'; return; }
  state.clientes.push({nome,avenca});
  ANOS.forEach(a=>{
    if(!state.rec[a]) state.rec[a]={};
    state.rec[a][nome]={avenca,meses:Array(12).fill(null)};
  });
  err.textContent=''; document.getElementById('recNewNome').value=''; document.getElementById('recNewAvenca').value='';
  saveMeta(); fbSet('/rec',state.rec); renderRECMgmt(); renderREC(); renderDash();
}
function removeClienteREC(nome){
  confirmAction('Remover Cliente',`Confirma a remoção de "${nome}" dos Recebimentos? Todos os históricos de pagamento serão apagados.`,()=>{
    state.clientes=state.clientes.filter(c=>c.nome!==nome);
    ANOS.forEach(a=>{ if(state.rec[a]) delete state.rec[a][nome]; });
    saveMeta(); fbSet('/rec',state.rec); renderRECMgmt(); renderREC(); renderDash();
  });
}

// ════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════
function renderDash(){
  const mesAtual=new Date().getMonth();
  const rec26=state.rec['2026']||{};
  let totalRec=0,totalFalta=0;
  state.clientes.forEach(c=>{
    const d=rec26[c.nome]||{};
    const ms=d.meses||Array(12).fill(null);
    const av=d.avenca||c.avenca||0;
    ms.forEach((m,i)=>{ if(m) totalRec+=av; else if(i<=mesAtual) totalFalta+=av; });
  });
  const iva26=state.iva['2026']||{};
  let ivaEnv=0,ivaPend=0;
  const trimAtual=Math.floor(mesAtual/3)+1;
  state.empresasIVA.filter(e=>e.ativa==='Sim'&&e.periodo==='Trimestral').forEach(e=>{
    for(let t=1;t<=trimAtual;t++){
      const td=(iva26[e.nome]||{})['T'+t]||{};
      if(td.enviada==='Sim') ivaEnv++; else ivaPend++;
    }
  });
  const saft26=state.saft['2026']||{};
  let saftOk=0,saftPend2=0;
  state.nomesSAFT.forEach(nome=>{
    const ms=saft26[nome]||[];
    for(let i=0;i<mesAtual*2;i+=2){
      const v=ms[i];
      if(v==='S'||v==='N'||v==='NA'||v==='V'||v==='C') saftOk++; else saftPend2++;
    }
  });
  const hoje=new Date();
  const alertas=[];
  const proxSAFT=new Date(hoje.getFullYear(),mesAtual+1,5);
  const diff=Math.ceil((proxSAFT-hoje)/86400000);
  if(diff>=0&&diff<=7) alertas.push(`SAFT de ${MESES[mesAtual]}: prazo dia 5 do próximo mês — faltam ${diff} dias`);

  document.getElementById('sec-dash').innerHTML=`
    <div class="sec-title">Dashboard — Visão Geral 2026</div>
    ${alertas.length?`<div class="alert-bar"><div><div class="alert-title">⏰ Alertas de Prazo</div><div class="alert-items">${alertas.join('<br>')}</div></div></div>`:''}
    <div class="cards-row">
      <div class="card"><div class="card-label">Recebido 2026</div><div class="card-value" style="color:var(--green)">€${totalRec.toLocaleString('pt-PT')}</div><div class="card-sub">até ${MESES[mesAtual]}</div></div>
      <div class="card"><div class="card-label">Em Falta 2026</div><div class="card-value" style="color:var(--red)">€${totalFalta.toLocaleString('pt-PT')}</div><div class="card-sub">${state.clientes.length} clientes</div></div>
      <div class="card"><div class="card-label">IVA Enviadas</div><div class="card-value" style="color:var(--green)">${ivaEnv}</div><div class="card-sub">${ivaPend} pendentes</div></div>
      <div class="card"><div class="card-label">SAFT Processados</div><div class="card-value" style="color:var(--blue)">${saftOk}</div><div class="card-sub">${saftPend2} por processar</div></div>
      <div class="card"><div class="card-label">Portfolio Total</div><div class="card-value">${state.clientes.length}</div><div class="card-sub">${state.empresasIVA.filter(e=>e.ativa==='Sim').length} c/ IVA · ${state.nomesSAFT.length} c/ SAFT</div></div>
    </div>
    <div class="table-wrap" style="padding:20px">
      <div style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:14px">📅 Prazos IVA 2026</div>
      <div class="prazos-grid">
        ${[{t:'1º Trimestre',p:'2 Maio 2026',d:'Jan · Fev · Mar'},{t:'2º Trimestre',p:'2 Agosto 2026',d:'Abr · Mai · Jun'},{t:'3º Trimestre',p:'2 Novembro 2026',d:'Jul · Ago · Set'},{t:'4º Trimestre',p:'2 Fevereiro 2027',d:'Out · Nov · Dez'}].map(x=>`<div class="prazo-card"><div class="pt">${x.t}</div><div class="pd">${x.p}</div><div class="ps">${x.d}</div></div>`).join('')}
      </div>
      <div style="margin-top:14px;font-size:12px;color:var(--gray)">
        📁 <strong style="color:var(--white)">SAFT</strong> — prazo até dia <strong style="color:var(--gold)">5 do mês seguinte</strong> &nbsp;·&nbsp;
        💶 <strong style="color:var(--white)">Pagamento IVA</strong> — até ao final do mês de entrega
      </div>
    </div>`;
}

// MAPA IVA
// ════════════════════════════════════════════
function renderIVA(){
  const trims=['T1','T2','T3','T4'];
  const trimNomes={T1:'1º Trim (Jan–Mar)',T2:'2º Trim (Abr–Jun)',T3:'3º Trim (Jul–Set)',T4:'4º Trim (Out–Dez)'};
  const prazoEnv={T1:'2 Mai',T2:'2 Ago',T3:'2 Nov',T4:'2 Fev'};

  const dadosAno=state.iva[ivaAno]||{};
  let lista=state.empresasIVA.filter(e=>e.ativa==='Sim');
  if(ivaFiltro==='trimestral') lista=lista.filter(e=>e.periodo==='Trimestral');
  else if(ivaFiltro==='mensal') lista=lista.filter(e=>e.periodo==='Mensal');
  if(ivaBusca) lista=lista.filter(e=>e.nome.toLowerCase().includes(ivaBusca));

  const listaT=lista.filter(e=>ivaFiltro!=='mensal'?e.periodo==='Trimestral':false);
  const listaM=lista.filter(e=>ivaFiltro!=='trimestral'?e.periodo==='Mensal':false);

  function buildTable(sublista,tipo){
    const totPags=Math.ceil(sublista.length/IVA_PP)||1;
    if(ivaPag>totPags) ivaPag=1;
    const pag=sublista.slice((ivaPag-1)*IVA_PP,ivaPag*IVA_PP);
    let env=0,pend=0;
    sublista.forEach(e=>{
      const d=dadosAno[e.nome]||{};
      trims.forEach(t=>{ const td=d[t]||{}; if(td.enviada==='Sim') env++; else pend++; });
    });

    let h=`<div class="table-wrap" style="margin-bottom:20px">
      <div class="tbar">
        <div class="tbar-title">${tipo==='T'?'Trimestrais':'Mensais'} — ${ivaAno} <span style="color:var(--gray);font-size:11px">(${sublista.length} empresas · ${env} enviadas · ${pend} pendentes)</span></div>
        <div class="tbar-right">
          ${userRole==='admin'?`<button class="btn-gestao" onclick="openGestaoIVA()">⚙️ Gerir Empresas</button>`:''}
        </div>
      </div>
      <div class="tbl-scroll"><table><thead>
        <tr>
          <th>Nº</th><th>Empresa</th>
          ${tipo==='T'?trims.map(t=>`<th colspan="3" style="text-align:center;border-left:1px solid #1a2f4a">${trimNomes[t]}<br><span style="font-size:9px;font-weight:400;color:var(--gray)">Env: ${prazoEnv[t]}</span></th>`).join(''):
            MESES.map(m=>`<th colspan="2" style="text-align:center;border-left:1px solid #1a2f4a">${m}</th>`).join('')}
        </tr>
        <tr style="background:#060f1e">
          <th></th><th></th>
          ${tipo==='T'?trims.map(()=>'<th style="border-left:1px solid #1a2f4a;font-size:9px">Tratada</th><th style="font-size:9px">Enviada</th><th style="font-size:9px">Obs.</th>').join(''):
            MESES.map(()=>'<th style="border-left:1px solid #1a2f4a;font-size:9px">Trat.</th><th style="font-size:9px">Env.</th>').join('')}
        </tr>
      </thead><tbody>`;

    pag.forEach(emp=>{
      const d=dadosAno[emp.nome]||{};
      h+=`<tr><td style="color:var(--gray);font-size:11px">${emp.num}</td><td class="td-nome">${emp.nome}</td>`;
      if(tipo==='T'){
        trims.forEach(t=>{
          const td=d[t]||{};
          h+=`<td style="border-left:1px solid #0f1f33">${ivaBadge(td.tratada,emp.nome,t,'tratada',ivaAno)}</td>`;
          h+=`<td>${ivaBadge(td.enviada,emp.nome,t,'enviada',ivaAno)}</td>`;
          h+=`<td><input class="obs-inp" value="${td.obs||''}" placeholder="…" onchange="saveIVAObs('${emp.nome.replace(/'/g,"\\'")}','${t}',this.value,'${ivaAno}')"></td>`;
        });
      } else {
        MESES.forEach((_,i)=>{
          const key='M'+(i+1);
          const td=d[key]||{};
          h+=`<td style="border-left:1px solid #0f1f33">${ivaBadge(td.tratada,emp.nome,key,'tratada',ivaAno)}</td>`;
          h+=`<td>${ivaBadge(td.enviada,emp.nome,key,'enviada',ivaAno)}</td>`;
        });
      }
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;
    if(totPags>1){
      h+=`<div class="pagination"><span class="pg-info">Pág ${ivaPag}/${totPags} (${sublista.length})</span>`;
      for(let p=1;p<=totPags;p++) h+=`<button class="pg-btn${p===ivaPag?' active':''}" onclick="ivaPag=${p};renderIVA()">${p}</button>`;
      h+=`</div>`;
    }
    h+=`</div>`;
    return h;
  }

  document.getElementById('sec-iva').innerHTML=`
    <div class="sec-title">
      🟡 Mapa Controlo IVA
      <div class="tbar-right">
        <select class="ctrl-sel" onchange="ivaAno=this.value;ivaPag=1;renderIVA()">
          ${ANOS.filter(a=>parseInt(a)>=2026).map(a=>`<option value="${a}"${a===ivaAno?' selected':''}>${a}</option>`).join('')}
        </select>
        <select class="ctrl-sel" onchange="ivaFiltro=this.value;ivaPag=1;renderIVA()">
          <option value="todos">Todos</option>
          <option value="trimestral">Trimestrais</option>
          <option value="mensal">Mensais</option>
        </select>
        <input class="ctrl-inp" placeholder="🔍 Pesquisar empresa…" oninput="ivaBusca=this.value.toLowerCase();ivaPag=1;renderIVA()">
      </div>
    </div>
    ${ivaFiltro!=='mensal'?buildTable(listaT,'T'):''}
    ${ivaFiltro!=='trimestral'?buildTable(listaM,'M'):''}`;
}

function ivaBadge(val,nome,trim,campo,ano){
  const estados=[null,'Sim','Não','N/A'];
  const cls={null:'b-empty',Sim:'b-sim','Não':'b-nao','N/A':'b-na'};
  const lbl={null:'—',Sim:'✓ Sim','Não':'✗ Não','N/A':'N/A'};
  const cur=val===undefined?null:val;
  return `<span class="badge ${cls[cur]}" onclick="toggleIVA('${nome.replace(/'/g,"\\'")}','${trim}','${campo}','${ano}')">${lbl[cur]}</span>`;
}
function toggleIVA(nome,trim,campo,ano){
  const estados=[null,'Sim','Não','N/A'];
  if(!state.iva[ano]) state.iva[ano]={};
  if(!state.iva[ano][nome]) state.iva[ano][nome]={};
  if(!state.iva[ano][nome][trim]) state.iva[ano][nome][trim]={};
  const cur=state.iva[ano][nome][trim][campo]??null;
  const next=estados[(estados.indexOf(cur)+1)%estados.length];
  state.iva[ano][nome][trim][campo]=next;
  fbSet(`/iva/${ano}/${encodeURIComponent(nome)}/${trim}/${campo}`,next);
  renderIVA(); renderDash();
}
function saveIVAObs(nome,trim,val,ano){
  if(!state.iva[ano]) state.iva[ano]={};
  if(!state.iva[ano][nome]) state.iva[ano][nome]={};
  if(!state.iva[ano][nome][trim]) state.iva[ano][nome][trim]={};
  state.iva[ano][nome][trim].obs=val;
  fbSet(`/iva/${ano}/${encodeURIComponent(nome)}/${trim}/obs`,val);
}

// ════════════════════════════════════════════
// SAFT
// ════════════════════════════════════════════
function renderSAFT(){
  const dadosAno=state.saft[saftAno]||{};
  let lista=state.nomesSAFT;
  if(saftBusca) lista=lista.filter(n=>n.toLowerCase().includes(saftBusca));
  const totPags=Math.ceil(lista.length/SAFT_PP)||1;
  if(saftPag>totPags) saftPag=1;
  const pag=lista.slice((saftPag-1)*SAFT_PP,saftPag*SAFT_PP);

  let cS=0,cN=0,cVazio=0;
  lista.forEach(nome=>{
    const ms=dadosAno[nome]||[];
    ms.forEach((v,i)=>{ if(i%2!==0) return; if(v==='S'||v==='N'||v==='NA'||v==='V'||v==='C') cS++; else cVazio++; });
  });

  let h=`<div class="sec-title">
    📁 Checklist SAFT
    <div class="tbar-right">
      <select class="ctrl-sel" onchange="saftAno=this.value;saftPag=1;renderSAFT()">
        ${ANOS.map(a=>`<option value="${a}"${a===saftAno?' selected':''}>${a}</option>`).join('')}
      </select>
      <input class="ctrl-inp" placeholder="🔍 Pesquisar empresa…" oninput="saftBusca=this.value.toLowerCase();saftPag=1;renderSAFT()">
      ${userRole==='admin'?`<button class="btn-gestao" onclick="openGestaoSAFT()">⚙️ Gerir Empresas</button>`:''}
    </div>
  </div>
  <div style="font-size:12px;color:var(--gray);margin-bottom:14px;">
    <span class="badge b-s" style="margin-right:6px">S = Enviado</span>
    <span class="badge b-n" style="margin-right:6px">N = Não tem SAFT</span>
    <span class="badge b-nav" style="margin-right:6px">NA = Não Aplic.</span>
    <span class="badge b-v" style="margin-right:6px">V = Vendas</span>
    <span class="badge b-c" style="margin-right:6px">C = Complementar</span>
    &nbsp;·&nbsp; Prazo: <strong style="color:var(--gold)">dia 5 do mês seguinte</strong>
    &nbsp;·&nbsp; ${cS} processados · ${cVazio} por preencher
  </div>
  <div class="table-wrap">
    <div class="tbl-scroll"><table><thead>
      <tr>
        <th>Nº</th><th>Empresa</th>
        ${MESES.map(m=>`<th colspan="2" style="text-align:center;border-left:1px solid #1a2f4a">${m}</th>`).join('')}
      </tr>
      <tr style="background:#060f1e">
        <th></th><th></th>
        ${MESES.map(()=>'<th style="border-left:1px solid #1a2f4a;font-size:9px">V</th><th style="font-size:9px">C</th>').join('')}
      </tr>
    </thead><tbody>`;

  pag.forEach((nome,i)=>{
    const ms=dadosAno[nome]||Array(24).fill(null);
    h+=`<tr><td style="color:var(--gray);font-size:11px">${(saftPag-1)*SAFT_PP+i+1}</td><td class="td-nome">${nome}</td>`;
    for(let m=0;m<12;m++){
      const v=ms[m*2]??null, c=ms[m*2+1]??null;
      h+=`<td style="border-left:1px solid #0f1f33">${saftBadge(v,nome,m*2,saftAno)}</td>`;
      h+=`<td>${saftBadge(c,nome,m*2+1,saftAno)}</td>`;
    }
    h+=`</tr>`;
  });

  h+=`</tbody></table></div>`;
  if(totPags>1){
    h+=`<div class="pagination"><span class="pg-info">Pág ${saftPag}/${totPags} (${lista.length} empresas)</span>`;
    for(let p=1;p<=totPags;p++) h+=`<button class="pg-btn${p===saftPag?' active':''}" onclick="saftPag=${p};renderSAFT()">${p}</button>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById('sec-saft').innerHTML=h;
}

function saftBadge(val,nome,idx,ano){
  const estados=[null,'S','N','NA','V','C'];
  const cls={null:'b-empty',S:'b-s',N:'b-n',NA:'b-nav',V:'b-v',C:'b-c'};
  const lbl={null:'·',S:'S',N:'N',NA:'NA',V:'V',C:'C'};
  const cur=val===undefined?null:val;
  return `<span class="badge ${cls[cur]}" style="font-size:11px;min-width:24px;text-align:center" onclick="toggleSAFT('${nome.replace(/'/g,"\\'")}',${idx},'${ano}')">${lbl[cur]}</span>`;
}
function toggleSAFT(nome,idx,ano){
  const estados=[null,'S','N','NA','V','C'];
  if(!state.saft[ano]) state.saft[ano]={};
  if(!state.saft[ano][nome]) state.saft[ano][nome]=Array(24).fill(null);
  const cur=state.saft[ano][nome][idx]??null;
  const next=estados[(estados.indexOf(cur)+1)%estados.length];
  state.saft[ano][nome][idx]=next;
  fbSet(`/saft/${ano}/${encodeURIComponent(nome)}/${idx}`,next);
  renderSAFT();
}

  pag.forEach((c,i)=>{

    const ms=d.meses||Array(12).fill(null);

    h+=`<tr><td style="color:var(--gray);font-size:11px">${(recPag-1)*REC_PP+i+1}</td><td class="td-nome">${c.nome}</td>`;
    ms.forEach((val,mi)=>{
      h+=`<td style="text-align:center"><select class="inline-sel" style="color:${recColor(val)}" onchange="saveRec('${c.nome.replace(/'/g,"\\'")}',${mi},this.value,'${recAno}')">
        <option value=""${!val?' selected':''}>—</option>
        ${tipos.map(t=>`<option value="${t}"${val===t?' selected':''}>${t}</option>`).join('')}
      </select></td>`;
    });
    h+=`<td style="text-align:right;color:var(--gold);font-weight:700">€${av.toLocaleString('pt-PT')}</td>
        <td style="text-align:right;color:var(--green)">€${rec.toLocaleString('pt-PT')}</td>
        <td style="text-align:right;color:${falta>0?'var(--red)':'var(--green)'}">€${falta.toLocaleString('pt-PT')}</td></tr>`;
  });

  h+=`</tbody></table></div>
    <div class="totais-bar">
      <div class="total-item">Total Recebido:<strong>€${totalRecebido.toLocaleString('pt-PT')}</strong></div>
      <div class="total-item">Em Falta:<strong style="color:var(--red)">€${totalFalta.toLocaleString('pt-PT')}</strong></div>
      <div class="total-item">Clientes filtrados:<strong>${lista.length}</strong></div>
    </div>`;
  if(totPags>1){
    h+=`<div class="pagination"><span class="pg-info">Pág ${recPag}/${totPags} (${lista.length} clientes)</span>`;
    for(let p=1;p<=totPags;p++) h+=`<button class="pg-btn${p===recPag?' active':''}" onclick="recPag=${p};renderREC()">${p}</button>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

function recColor(val){
  if(!val) return 'var(--red)';
  if(val==='Transferência') return 'var(--blue)';
  if(val==='MBWay') return '#bb8fce';
  if(val==='Numerário') return 'var(--orange)';
  if(val==='Débito Direto') return 'var(--green)';
  return 'var(--gray)';
}
function unlockRec(){
  if(document.getElementById('recPass').value===PASS_ADMIN){ recLocked=false; renderREC(); }
  else document.getElementById('recPassErr').textContent='Senha incorreta.';
}
function saveRec(nome,mesIdx,val,ano){
  if(!state.rec[ano]) state.rec[ano]={};
  if(!state.rec[ano][nome]) state.rec[ano][nome]={avenca:state.clientes.find(c=>c.nome===nome)?.avenca||0,meses:Array(12).fill(null)};
  state.rec[ano][nome].meses[mesIdx]=val||null;
  fbSet(`/rec/${ano}/${encodeURIComponent(nome)}/meses/${mesIdx}`,val||null);
  renderDash();
}

// Init
document.getElementById('loginPass').focus();
</script>
